<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">新疆伊犁自驾行程 (2026.5.1 - 5.6)</text>
  
  <!-- 每日路线 -->
  <!-- Day 1 红色: 伊宁 - 赛里木湖 - 果子沟大桥 - 伊宁 -->
  <line x1="100" y1="300" x2="80" y2="100" stroke="#e74c3c" stroke-width="3" />
  <line x1="80" y2="100" x2="70" y2="120" stroke="#e74c3c" stroke-width="3" />
  <line x1="70" y2="120" x2="100" y2="300" stroke="#e74c3c" stroke-width="3" />
  
  <!-- Day 2 蓝色: 伊宁 - 喀拉峻 - 特克斯 -->
  <line x1="100" y1="300" x2="250" y2="350" stroke="#3498db" stroke-width="3" />
  <line x1="250" y2="350" x2="200" y2="330" stroke="#3498db" stroke-width="3" />
  
  <!-- Day 3 绿色: 特克斯 - 库尔德宁 - 巩留 -->
  <line x1="200" y1="330" x2="300" y2="320" stroke="#2ecc71" stroke-width="3" />
  <line x1="300" y2="320" x2="260" y2="270" stroke="#2ecc71" stroke-width="3" />
  
  <!-- Day 4 橙色: 巩留 - 那拉提 - 新源 -->
  <line x1="260" y1="270" x2="400" y2="290" stroke="#f39c12" stroke-width="3" />
  <line x1="400" y2="290" x2="360" y2="280" stroke="#f39c12" stroke-width="3" />
  
  <!-- Day 5 紫色: 新源 - 蜂蜜小镇 - 乔尔玛 - 蜂蜜小镇 - 仙女湖 -->
  <line x1="360" y1="280" x2="300" y2="200" stroke="#9b59b6" stroke-width="3" />
  <line x1="300" y2="200" x2="450" y2="230" stroke="#9b59b6" stroke-width="3" />
  <line x1="450" y2="230" x2="300" y2="200" stroke="#9b59b6" stroke-width="3" />
  <line x1="300" y2="200" x2="410" y2="275" stroke="#9b59b6" stroke-width="3" />
  
  <!-- Day 6 青绿色: 仙女湖 - 伊宁 - 乌鲁木齐 -->
  <line x1="410" y1="275" x2="100" y2="300" stroke="#1abc9c" stroke-width="3" />
  <line x1="100" y2="300" x2="820" y2="310" stroke="#1abc9c" stroke-width="3" />
  
  <!-- 地点标记 -->
  <circle cx="100" cy="300" r="6" fill="#e74c3c" />
  <circle cx="80" cy="100" r="6" fill="#e74c3c" />
  <circle cx="70" cy="120" r="6" fill="#e74c3c" />
  <circle cx="250" cy="350" r="6" fill="#3498db" />
  <circle cx="200" cy="330" r="6" fill="#3498db" />
  <circle cx="300" cy="320" r="6" fill="#2ecc71" />
  <circle cx="260" cy="270" r="6" fill="#2ecc71" />
  <circle cx="400" cy="290" r="6" fill="#f39c12" />
  <circle cx="360" cy="280" r="6" fill="#f39c12" />
  <circle cx="300" cy="200" r="6" fill="#9b59b6" />
  <circle cx="450" cy="230" r="6" fill="#9b59b6" />
  <circle cx="410" cy="275" r="6" fill="#9b59b6" />
  <circle cx="820" cy="310" r="6" fill="#1abc9c" />
  
  <!-- 地点名称标注 -->
  <text x="110" y="305" font-size="14" font-weight="bold" fill="#2c3e50">伊宁</text>
  <text x="40" y="105" font-size="14" font-weight="bold" fill="#2c3e50">赛里木湖</text>
  <text x="30" y="125" font-size="14" font-weight="bold" fill="#2c3e50">果子沟大桥</text>
  <text x="260" y="355" font-size="14" font-weight="bold" fill="#2c3e50">喀拉峻</text>
  <text x="210" y="335" font-size="14" font-weight="bold" fill="#2c3e50">特克斯</text>
  <text x="310" y="325" font-size="14" font-weight="bold" fill="#2c3e50">库尔德宁</text>
  <text x="270" y="275" font-size="14" font-weight="bold" fill="#2c3e50">巩留</text>
  <text x="410" y="295" font-size="14" font-weight="bold" fill="#2c3e50">那拉提</text>
  <text x="370" y="285" font-size="14" font-weight="bold" fill="#2c3e50">新源</text>
  <text x="250" y="205" font-size="14" font-weight="bold" fill="#2c3e50">蜂蜜小镇</text>
  <text x="460" y="235" font-size="14" font-weight="bold" fill="#2c3e50">乔尔玛</text>
  <text x="420" y="280" font-size="14" font-weight="bold" fill="#2c3e50">仙女湖</text>
  <text x="830" y="315" font-size="14" font-weight="bold" fill="#2c3e50">乌鲁木齐</text>
  
  <!-- 图例 -->
  <rect x="50" y="400" width="20" height="12" fill="#e74c3c" />
  <text x="80" y="410" font-size="14" fill="#2c3e50">5.1 伊宁 - 赛里木湖 - 果子沟大桥 - 伊宁</text>
  
  <rect x="50" y="425" width="20" height="12" fill="#3498db" />
  <text x="80" y="435" font-size="14" fill="#2c3e50">5.2 伊宁 - 喀拉峻 - 特克斯</text>
  
  <rect x="50" y="450" width="20" height="12" fill="#2ecc71" />
  <text x="80" y="460" font-size="14" fill="#2c3e50">5.3 特克斯 - 库尔德宁 - 巩留</text>
  
  <rect x="400" y="400" width="20" height="12" fill="#f39c12" />
  <text x="430" y="410" font-size="14" fill="#2c3e50">5.4 巩留 - 那拉提 - 新源</text>
  
  <rect x="400" y="425" width="20" height="12" fill="#9b59b6" />
  <text x="430" y="435" font-size="14" fill="#2c3e50">5.5 新源 - 蜂蜜小镇 - 乔尔玛 - 仙女湖</text>
  
  <rect x="400" y="450" width="20" height="12" fill="#1abc9c" />
  <text x="430" y="460" font-size="14" fill="#2c3e50">5.6 仙女湖 - 伊宁 - 乌鲁木齐</text>
</svg>
