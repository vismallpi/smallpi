<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 630" font-family="'Comic Neue', 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif">
  <defs>
    <!-- 箭头定义 -->
    <marker id="arrow-solid" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e67e22"/>
    </marker>
    <marker id="arrow-dash" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f39c12"/>
    </marker>
    <marker id="arrow-return" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#95a5a6"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3498db"/>
    </marker>
    
    <!-- 背景渐变 -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfbf7"/>
      <stop offset="100%" stop-color="#f5f0e8"/>
    </linearGradient>
    
    <!-- 柔和阴影 -->
    <filter id="soft-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#d4c5a9" flood-opacity="0.4"/>
    </filter>
    <filter id="light-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feMerge>
        <feMergeNode in="offsetblur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1080" height="630" fill="url(#bg)"/>
  
  <!-- 背景装饰：淡淡的山脉轮廓 -->
  <path d="M0,560 Q150,520 275,540 Q400,490 550,520 Q700,480 850,510 Q970,490 1080,515 L1080,630 L0,630 Z" fill="#e8e0d0" opacity="0.4"/>
  <path d="M0,570 Q225,540 400,560 Q575,530 750,555 Q900,535 1080,560 L1080,630 L0,630 Z" fill="#ddd2be" opacity="0.3"/>

  <!-- ==================== 主路线图（环线布局） ==================== -->
  <!-- 
    乌鲁木齐 (900, 550) — 右下角起点
    安集海大峡谷 (725, 460)
    精河县 (588, 405)
    赛里木湖 (263, 235) — 左上方
    果子沟大桥 (350, 265)
    伊宁 (500, 465) — 下方中央（起终点之一）
    喀拉峻 (406, 380)
    特克斯 (475, 415)
    库尔德宁 (575, 390)
    巩留 (650, 415)
    那拉提 (775, 300)
    新源 (705, 330)
    蜂蜜小镇 (725, 215)
    乔尔玛 (682, 170)
    仙女湖 (638, 130)
   -->
  
  <!-- 主路线连线（顺时针环线） -->
  <!-- D1: 乌鲁木齐 → 安集海大峡谷 → 精河县 -->
  <path d="M900,550 Q800,510 738,478 Q728,465 725,460" 
        stroke="#e74c3c" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M725,460 Q650,430 588,405" 
        stroke="#e74c3c" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D2: 精河县 → 赛里木湖 → 果子沟大桥 → 伊宁 -->
  <path d="M588,405 Q475,350 375,290 Q300,250 263,235" 
        stroke="#3498db" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <path d="M263,235 Q305,255 350,265" 
        stroke="#3498db" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <path d="M350,265 Q450,350 450,430 Q475,445 500,465" 
        stroke="#3498db" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-blue)"/>

  <!-- D3: 伊宁 → 喀拉峻 → 特克斯 -->
  <path d="M500,465 Q450,430 419,400 Q410,385 406,380" 
        stroke="#2ecc71" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M406,380 Q440,400 475,415" 
        stroke="#2ecc71" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D4: 特克斯 → 库尔德宁 → 巩留 -->
  <path d="M475,415 Q525,400 575,390" 
        stroke="#f39c12" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M575,390 Q612,400 650,415" 
        stroke="#f39c12" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D5: 巩留 → 那拉提 → 新源 -->
  <path d="M650,415 Q712,375 762,330 Q772,313 775,300" 
        stroke="#9b59b6" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M775,300 Q740,315 705,330" 
        stroke="#9b59b6" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D6: 新源 → 蜂蜜小镇 → 乔尔玛 → 返蜂蜜小镇 → 仙女湖 -->
  <path d="M705,330 Q715,275 725,235 Q727,222 725,215" 
        stroke="#e67e22" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M725,215 Q705,195 692,180" 
        stroke="#e67e22" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <!-- 乔尔玛 → 蜂蜜小镇（返程虚线） -->
  <path d="M682,170 Q700,190 718,208 Q722,212 725,215" 
        stroke="#95a5a6" stroke-width="3" stroke-dasharray="8,6" fill="none" stroke-linecap="round"/>
  <!-- 蜂蜜小镇 → 仙女湖 -->
  <path d="M725,215 Q700,180 660,145 Q648,138 638,130" 
        stroke="#e67e22" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D7: 仙女湖 → 伊宁 → 乌鲁木齐 -->
  <path d="M638,130 Q585,250 525,375 Q512,425 500,465" 
        stroke="#95a5a6" stroke-width="3" stroke-dasharray="8,6" fill="none" stroke-linecap="round" marker-end="url(#arrow-return)"/>
  <path d="M500,465 Q625,485 750,510 Q850,530 900,550" 
        stroke="#95a5a6" stroke-width="3" stroke-dasharray="8,6" fill="none" stroke-linecap="round" marker-end="url(#arrow-return)"/>


  <!-- ==================== 节点圆点 ==================== -->
  
  <!-- 乌鲁木齐（起点） -->
  <circle cx="900" cy="550" r="20" fill="#c0392b" stroke="#fff" stroke-width="4" filter="url(#soft-shadow)"/>
  <text x="900" y="555" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">乌鲁木齐</text>
  <text x="900" y="580" text-anchor="middle" font-size="12" fill="#c0392b">🚩 起点</text>

  <!-- 安集海大峡谷 -->
  <circle cx="725" cy="460" r="15" fill="#e74c3c" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="725" y="445" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">安集海峡谷</text>

  <!-- 精河县 -->
  <circle cx="588" cy="405" r="14" fill="#e74c3c" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="588" y="425" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">精河县</text>

  <!-- 赛里木湖 -->
  <circle cx="263" cy="235" r="18" fill="#3498db" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="263" y="210" text-anchor="middle" font-size="14" fill="#2c3e50" font-weight="bold">赛里木湖</text>
  <text x="263" y="255" text-anchor="middle" font-size="11" fill="#2980b9">✨ 大西洋最后一滴眼泪</text>

  <!-- 果子沟大桥 -->
  <circle cx="350" cy="265" r="13" fill="#3498db" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="350" y="285" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">果子沟大桥</text>

  <!-- 伊宁 -->
  <circle cx="500" cy="465" r="19" fill="#2c3e50" stroke="#fff" stroke-width="4" filter="url(#soft-shadow)"/>
  <text x="500" y="470" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">伊宁</text>
  <text x="500" y="495" text-anchor="middle" font-size="11" fill="#2c3e50">中转站</text>

  <!-- 喀拉峻 -->
  <circle cx="406" cy="380" r="15" fill="#27ae60" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="365" y="370" text-anchor="end" font-size="14" fill="#2c3e50" font-weight="bold">喀拉峻</text>
  <text x="365" y="385" text-anchor="end" font-size="11" fill="#27ae60">草原之王</text>

  <!-- 特克斯八卦城 -->
  <circle cx="475" cy="415" r="15" fill="#27ae60" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="475" y="400" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">特克斯</text>
  <text x="475" y="435" text-anchor="middle" font-size="10" fill="#27ae60">八卦城</text>

  <!-- 库尔德宁 -->
  <circle cx="575" cy="390" r="13" fill="#f39c12" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="575" y="375" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">库尔德宁</text>

  <!-- 巩留 -->
  <circle cx="650" cy="415" r="14" fill="#f39c12" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="650" y="435" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">巩留</text>

  <!-- 那拉提 -->
  <circle cx="775" cy="300" r="18" fill="#8e44ad" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="775" y="280" text-anchor="middle" font-size="14" fill="#2c3e50" font-weight="bold">那拉提</text>
  <text x="775" y="320" text-anchor="middle" font-size="11" fill="#8e44ad">空中草原</text>

  <!-- 新源 -->
  <circle cx="705" cy="330" r="14" fill="#8e44ad" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="705" y="345" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">新源</text>

  <!-- 蜂蜜小镇 -->
  <circle cx="725" cy="215" r="13" fill="#e67e22" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="725" y="200" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">蜂蜜小镇</text>

  <!-- 乔尔玛 -->
  <circle cx="682" cy="170" r="15" fill="#e67e22" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="682" y="155" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">乔尔玛</text>
  <text x="682" y="185" text-anchor="middle" font-size="10" fill="#e67e22">烈士陵园</text>

  <!-- 仙女湖 -->
  <circle cx="638" cy="130" r="14" fill="#e67e22" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="638" y="115" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">仙女湖</text>


  <!-- ==================== 车程标注 ==================== -->
  
  <!-- D1 乌鲁木齐→安集海 -->
  <g transform="translate(812, 508) rotate(-15)">
    <rect x="-48" y="-15" width="96" height="25" rx="12" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#e74c3c">🚗 约230km/3h</text>
  </g>
  
  <!-- 安集海→精河 -->
  <g transform="translate(657, 432) rotate(-10)">
    <rect x="-45" y="-13" width="88" height="22" rx="11" fill="#fdedec" stroke="#e74c3c" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" fill="#e74c3c">约140km/2h</text>
  </g>

  <!-- D2 精河→赛湖 -->
  <g transform="translate(419, 318) rotate(-20)">
    <rect x="-45" y="-13" width="88" height="22" rx="11" fill="#ebf5fb" stroke="#3498db" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" fill="#2980b9">约140km/2h</text>
  </g>
  
  <!-- 赛湖→果子沟 -->
  <g transform="translate(306, 250) rotate(15)">
    <rect x="-32" y="-12" width="62" height="22" rx="11" fill="#ebf5fb" stroke="#3498db" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" fill="#2980b9">50km/1h</text>
  </g>
  
  <!-- 果子沟→伊宁 -->
  <g transform="translate(413, 365) rotate(-10)">
    <rect x="-45" y="-13" width="88" height="22" rx="11" fill="#ebf5fb" stroke="#3498db" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" fill="#2980b9">约120km/2h</text>
  </g>

  <!-- D3 伊宁→喀拉峻 -->
  <g transform="translate(456, 440) rotate(12)">
    <rect x="-38" y="-13" width="75" height="22" rx="11" fill="#e8f8f5" stroke="#2ecc71" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" fill="#27ae60">110km/2h</text>
  </g>
  
  <!-- 喀拉峻→特克斯 -->
  <g transform="translate(440, 397) rotate(-8)">
    <rect x="-32" y="-12" width="62" height="22" rx="11" fill="#e8f8f5" stroke="#2ecc71" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" fill="#27ae60">41km/1h</text>
  </g>

  <!-- D4 特克斯→库尔德宁 -->
  <g transform="translate(525, 402) rotate(0)">
    <rect x="-44" y="-13" width="88" height="22" rx="11" fill="#fef9e7" stroke="#f39c12" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" fill="#e67e22">约100km/2h</text>
  </g>
  
  <!-- 库尔德宁→巩留 -->
  <g transform="translate(612, 402) rotate(-10)">
    <rect x="-38" y="-13" width="75" height="22" rx="11" fill="#fef9e7" stroke="#f39c12" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" fill="#e67e22">50km/1h</text>
  </g>

  <!-- D5 巩留→那拉提 -->
  <g transform="translate(712, 367) rotate(-20)">
    <rect x="-48" y="-15" width="96" height="25" rx="12" fill="#f4ecf7" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#8e44ad">🚗 约155km/2.5h</text>
  </g>
  
  <!-- 那拉提→新源 -->
  <g transform="translate(740, 315) rotate(10)">
    <rect x="-38" y="-13" width="75" height="22" rx="11" fill="#f4ecf7" stroke="#9b59b6" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" fill="#8e44ad">约80km/1.5h</text>
  </g>

  <!-- D6 新源→蜂蜜小镇 -->
  <g transform="translate(715, 268) rotate(-12)">
    <rect x="-44" y="-13" width="88" height="22" rx="11" fill="#fef9e7" stroke="#e67e22" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" fill="#e67e22">约85km/1.5h</text>
  </g>
  
  <!-- 蜂蜜小镇→乔尔玛 -->
  <g transform="translate(702, 192) rotate(-10)">
    <rect x="-38" y="-13" width="75" height="22" rx="11" fill="#fef9e7" stroke="#e67e22" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" fill="#e67e22">约60km/1h</text>
  </g>

  <!-- 蜂蜜小镇→仙女湖 -->
  <g transform="translate(682, 172) rotate(-25)">
    <rect x="-38" y="-13" width="75" height="22" rx="11" fill="#fef9e7" stroke="#e67e22" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" fill="#e67e22">约40km/1h</text>
  </g>

  <!-- D7 仙女湖→伊宁 -->
  <g transform="translate(569, 308) rotate(-25)">
    <rect x="-48" y="-13" width="96" height="22" rx="11" fill="#e8e0d0" stroke="#95a5a6" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" fill="#7f8c8d">约250km/4h</text>
  </g>
  
  <!-- 伊宁→乌鲁木齐 -->
  <g transform="translate(700, 508) rotate(-10)">
    <rect x="-52" y="-15" width="104" height="25" rx="12" fill="#e8e0d0" stroke="#95a5a6" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#7f8c8d">🚗 约690km/8h</text>
  </g>


  <!-- ==================== 每日行程卡片（右侧） ==================== -->
  
  <!-- D1 卡片 -->
  <g transform="translate(890, 30)">
    <rect x="0" y="0" width="175" height="50" rx="12" fill="#fdedec" stroke="#e74c3c" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#e74c3c" font-weight="bold">Day 1 · 5/1</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">乌鲁木齐→安集海→精河</text>
  </g>

  <!-- D2 卡片 -->
  <g transform="translate(890, 90)">
    <rect x="0" y="0" width="175" height="50" rx="12" fill="#ebf5fb" stroke="#3498db" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#2980b9" font-weight="bold">Day 2 · 5/2</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">精河→赛湖→果子沟→伊宁</text>
  </g>

  <!-- D3 卡片 -->
  <g transform="translate(890, 150)">
    <rect x="0" y="0" width="175" height="50" rx="12" fill="#e8f8f5" stroke="#2ecc71" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#27ae60" font-weight="bold">Day 3 · 5/3</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">伊宁→喀拉峻→特克斯</text>
  </g>

  <!-- D4 卡片 -->
  <g transform="translate(890, 210)">
    <rect x="0" y="0" width="175" height="50" rx="12" fill="#fef9e7" stroke="#f39c12" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#e67e22" font-weight="bold">Day 4 · 5/4</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">特克斯→库尔德宁→巩留</text>
  </g>

  <!-- D5 卡片 -->
  <g transform="translate(890, 270)">
    <rect x="0" y="0" width="175" height="50" rx="12" fill="#f4ecf7" stroke="#9b59b6" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#8e44ad" font-weight="bold">Day 5 · 5/5</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">巩留→那拉提→新源</text>
  </g>

  <!-- D6 卡片 -->
  <g transform="translate(890, 330)">
    <rect x="0" y="0" width="175" height="50" rx="12" fill="#fef9e7" stroke="#e67e22" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#e67e22" font-weight="bold">Day 6 · 5/6</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">新源→蜂蜜小镇→乔尔玛→仙女湖</text>
  </g>

  <!-- D7 卡片 -->
  <g transform="translate(890, 390)">
    <rect x="0" y="0" width="175" height="50" rx="12" fill="#e8e0d0" stroke="#95a5a6" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#7f8c8d" font-weight="bold">Day 7 · 5/7</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">仙女湖→伊宁→乌鲁木齐</text>
  </g>


  <!-- ==================== 图例 / 说明 ==================== -->
  
  <g transform="translate(30, 550)">
    <rect x="0" y="0" width="260" height="80" rx="12" fill="white" stroke="#d5cfc0" stroke-width="1" opacity="0.92"/>
    <text x="15" y="24" font-size="12" fill="#2c3e50" font-weight="bold">📌 图例</text>
    
    <line x1="15" y1="42" x2="48" y2="42" stroke="#e67e22" stroke-width="3" stroke-linecap="round"/>
    <text x="55" y="46" font-size="10" fill="#5d6d7e">主路线（去程）</text>
    
    <line x1="15" y1="62" x2="48" y2="62" stroke="#95a5a6" stroke-width="2" stroke-dasharray="6,4" stroke-linecap="round"/>
    <text x="55" y="66" font-size="10"