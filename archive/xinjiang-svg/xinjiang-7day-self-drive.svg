<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 750" font-family="'Comic Neue', 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif">
  <defs>
    <!-- 箭头定义 -->
    <marker id="arrow-solid" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e67e22"/>
    </marker>
    <marker id="arrow-dash" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f39c12"/>
    </marker>
    <marker id="arrow-return" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#95a5a6"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3498db"/>
    </marker>
    
    <!-- 背景渐变 -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfbf7"/>
      <stop offset="100%" stop-color="#f5f0e8"/>
    </linearGradient>
    
    <!-- 柔和阴影 -->
    <filter id="soft-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#d4c5a9" flood-opacity="0.4"/>
    </filter>
    <filter id="light-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feMerge>
        <feMergeNode in="offsetblur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="860" height="750" fill="url(#bg)"/>
  
  <!-- 背景装饰：淡淡的山脉轮廓 -->
  <path d="M0,670 Q120,630 220,650 Q320,610 440,640 Q560,600 680,635 Q780,610 860,640 L860,750 L0,750 Z" fill="#e8e0d0" opacity="0.4"/>
  <path d="M0,690 Q180,660 320,680 Q460,650 600,675 Q720,655 860,680 L860,750 L0,750 Z" fill="#ddd2be" opacity="0.3"/>

  <!-- ==================== 主路线图（环线布局） ==================== -->
  
  <!--
    环线布局构思：
    乌鲁木齐 (720, 680) — 右下角起点
    安集海大峡谷 (580, 560)
    精河县 (460, 480)
    赛里木湖 (200, 280) — 左上方
    果子沟大桥 (280, 320)
    伊宁 (400, 560) — 下方中央（起终点之一）
    喀拉峻 (320, 460)
    特克斯 (380, 500)
    库尔德宁 (470, 470)
    巩留 (520, 500)
    那拉提 (620, 360)
    新源 (560, 400)
    蜂蜜小镇 (580, 260)
    乔尔玛 (540, 200)
    仙女湖 (510, 160)
  -->
  
  <!-- 主路线连线（顺时针环线） -->

  <!-- D1: 乌鲁木齐 → 安集海大峡谷 → 精河县 -->
  <path d="M720,660 Q640,620 590,580 Q575,565 580,556" 
        stroke="#e74c3c" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M580,556 Q520,520 470,490" 
        stroke="#e74c3c" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D2: 精河县 → 赛里木湖 → 果子沟大桥 → 伊宁 -->
  <path d="M460,480 Q380,420 300,350 Q240,300 210,285" 
        stroke="#3498db" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <path d="M210,285 Q245,305 280,320" 
        stroke="#3498db" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <path d="M280,320 Q320,400 360,490 Q380,530 400,560" 
        stroke="#3498db" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-blue)"/>

  <!-- D3: 伊宁 → 喀拉峻 → 特克斯 -->
  <path d="M400,560 Q360,530 335,490 Q322,472 325,460" 
        stroke="#2ecc71" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M325,460 Q350,485 380,500" 
        stroke="#2ecc71" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D4: 特克斯 → 库尔德宁 → 巩留 -->
  <path d="M380,500 Q430,490 460,472" 
        stroke="#f39c12" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M460,472 Q490,490 520,500" 
        stroke="#f39c12" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D5: 巩留 → 那拉提 → 新源 -->
  <path d="M520,500 Q570,450 610,400 Q625,378 620,360" 
        stroke="#9b59b6" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M620,360 Q595,380 565,395" 
        stroke="#9b59b6" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D6: 新源 → 蜂蜜小镇 → 乔尔玛 → 返蜂蜜小镇 → 仙女湖 -->
  <path d="M560,395 Q570,330 580,280 Q582,265 580,260" 
        stroke="#e67e22" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M580,260 Q560,240 545,205" 
        stroke="#e67e22" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <!-- 乔尔玛 → 蜂蜜小镇（返程虚线） -->
  <path d="M545,205 Q560,230 575,255 Q578,262 580,260" 
        stroke="#95a5a6" stroke-width="2.5" stroke-dasharray="8,6" fill="none" stroke-linecap="round"/>
  <!-- 蜂蜜小镇 → 仙女湖 -->
  <path d="M580,260 Q560,220 525,175 Q515,165 510,160" 
        stroke="#e67e22" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D7: 仙女湖 → 伊宁 → 乌鲁木齐 -->
  <path d="M510,160 Q470,300 420,450 Q410,510 400,560" 
        stroke="#95a5a6" stroke-width="2.5" stroke-dasharray="8,6" fill="none" stroke-linecap="round" marker-end="url(#arrow-return)"/>
  <path d="M400,560 Q500,580 600,610 Q680,635 720,660" 
        stroke="#95a5a6" stroke-width="2.5" stroke-dasharray="8,6" fill="none" stroke-linecap="round" marker-end="url(#arrow-return)"/>


  <!-- ==================== 节点圆点 ==================== -->
  
  <!-- 乌鲁木齐（起点） -->
  <circle cx="720" cy="660" r="16" fill="#c0392b" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="720" y="665" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">乌鲁木齐</text>
  <text x="720" y="690" text-anchor="middle" font-size="9" fill="#c0392b">🚩 起点</text>

  <!-- 安集海大峡谷 -->
  <circle cx="580" cy="556" r="12" fill="#e74c3c" stroke="#fff" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text x="580" y="540" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">安集海峡谷</text>

  <!-- 精河县 -->
  <circle cx="470" cy="490" r="11" fill="#e74c3c" stroke="#fff" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text x="470" y="508" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">精河县</text>

  <!-- 赛里木湖 -->
  <circle cx="210" cy="285" r="14" fill="#3498db" stroke="#fff" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text x="210" y="260" text-anchor="middle" font-size="11" fill="#2c3e50" font-weight="bold">赛里木湖</text>
  <text x="210" y="305" text-anchor="middle" font-size="9" fill="#2980b9">✨ 大西洋最后一滴眼泪</text>

  <!-- 果子沟大桥 -->
  <circle cx="280" cy="320" r="10" fill="#3498db" stroke="#fff" stroke-width="2" filter="url(#soft-shadow)"/>
  <text x="280" y="335" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">果子沟大桥</text>

  <!-- 伊宁 -->
  <circle cx="400" cy="560" r="15" fill="#2c3e50" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="400" y="565" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">伊宁</text>
  <text x="400" y="585" text-anchor="middle" font-size="9" fill="#2c3e50">中转站</text>

  <!-- 喀拉峻 -->
  <circle cx="325" cy="460" r="12" fill="#27ae60" stroke="#fff" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text x="290" y="450" text-anchor="end" font-size="11" fill="#2c3e50" font-weight="bold">喀拉峻</text>
  <text x="290" y="465" text-anchor="end" font-size="9" fill="#27ae60">草原之王</text>

  <!-- 特克斯八卦城 -->
  <circle cx="380" cy="500" r="12" fill="#27ae60" stroke="#fff" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text x="380" y="485" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">特克斯</text>
  <text x="380" y="518" text-anchor="middle" font-size="8" fill="#27ae60">八卦城</text>

  <!-- 库尔德宁 -->
  <circle cx="460" cy="472" r="10" fill="#f39c12" stroke="#fff" stroke-width="2" filter="url(#soft-shadow)"/>
  <text x="460" y="458" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">库尔德宁</text>

  <!-- 巩留 -->
  <circle cx="520" cy="500" r="11" fill="#f39c12" stroke="#fff" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text x="520" y="518" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">巩留</text>

  <!-- 那拉提 -->
  <circle cx="620" cy="360" r="14" fill="#8e44ad" stroke="#fff" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text x="620" y="340" text-anchor="middle" font-size="11" fill="#2c3e50" font-weight="bold">那拉提</text>
  <text x="620" y="378" text-anchor="middle" font-size="9" fill="#8e44ad">空中草原</text>

  <!-- 新源 -->
  <circle cx="565" cy="395" r="11" fill="#8e44ad" stroke="#fff" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text x="565" y="412" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">新源</text>

  <!-- 蜂蜜小镇 -->
  <circle cx="580" cy="260" r="10" fill="#e67e22" stroke="#fff" stroke-width="2" filter="url(#soft-shadow)"/>
  <text x="580" y="248" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">蜂蜜小镇</text>

  <!-- 乔尔玛 -->
  <circle cx="545" cy="205" r="12" fill="#e67e22" stroke="#fff" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text x="545" y="188" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">乔尔玛</text>
  <text x="545" y="222" text-anchor="middle" font-size="8" fill="#e67e22">烈士陵园</text>

  <!-- 仙女湖 -->
  <circle cx="510" cy="160" r="11" fill="#e67e22" stroke="#fff" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text x="510" y="145" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="bold">仙女湖</text>


  <!-- ==================== 车程标注 ==================== -->
  
  <!-- D1 乌鲁木齐→安集海 -->
  <g transform="translate(650, 610) rotate(-15)">
    <rect x="-38" y="-12" width="76" height="20" rx="10" fill="#fdedec" stroke="#e74c3c" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="9" fill="#e74c3c">🚗 约230km/3h</text>
  </g>
  
  <!-- 安集海→精河 -->
  <g transform="translate(525, 520) rotate(-10)">
    <rect x="-35" y="-10" width="70" height="18" rx="9" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" font-size="8" fill="#e74c3c">约140km/2h</text>
  </g>

  <!-- D2 精河→赛湖 -->
  <g transform="translate(335, 385) rotate(-20)">
    <rect x="-35" y="-10" width="70" height="18" rx="9" fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" font-size="8" fill="#2980b9">约140km/2h</text>
  </g>
  
  <!-- 赛湖→果子沟 -->
  <g transform="translate(250, 300) rotate(15)">
    <rect x="-25" y="-10" width="50" height="18" rx="9" fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" font-size="8" fill="#2980b9">50km/1h</text>
  </g>
  
  <!-- 果子沟→伊宁 -->
  <g transform="translate(330, 440) rotate(-10)">
    <rect x="-35" y="-10" width="70" height="18" rx="9" fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" font-size="8" fill="#2980b9">约120km/2h</text>
  </g>

  <!-- D3 伊宁→喀拉峻 -->
  <g transform="translate(365, 535) rotate(12)">
    <rect x="-30" y="-10" width="60" height="18" rx="9" fill="#e8f8f5" stroke="#2ecc71" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" font-size="8" fill="#27ae60">110km/2h</text>
  </g>
  
  <!-- 喀拉峻→特克斯 -->
  <g transform="translate(360, 480) rotate(-8)">
    <rect x="-25" y="-10" width="50" height="18" rx="9" fill="#e8f8f5" stroke="#2ecc71" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" font-size="8" fill="#27ae60">41km/1h</text>
  </g>

  <!-- D4 特克斯→库尔德宁 -->
  <g transform="translate(425, 485) rotate(0)">
    <rect x="-35" y="-10" width="70" height="18" rx="9" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" font-size="8" fill="#e67e22">约100km/2h</text>
  </g>
  
  <!-- 库尔德宁→巩留 -->
  <g transform="translate(495, 485) rotate(-10)">
    <rect x="-30" y="-10" width="60" height="18" rx="9" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" font-size="8" fill="#e67e22">50km/1h</text>
  </g>

  <!-- D5 巩留→那拉提 -->
  <g transform="translate(575, 445) rotate(-20)">
    <rect x="-38" y="-12" width="76" height="20" rx="10" fill="#f4ecf7" stroke="#9b59b6" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="9" fill="#8e44ad">🚗 约155km/2.5h</text>
  </g>
  
  <!-- 那拉提→新源 -->
  <g transform="translate(600, 378) rotate(10)">
    <rect x="-30" y="-10" width="60" height="18" rx="9" fill="#f4ecf7" stroke="#9b59b6" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" font-size="8" fill="#8e44ad">约80km/1.5h</text>
  </g>

  <!-- D6 新源→蜂蜜小镇 -->
  <g transform="translate(575, 325) rotate(-12)">
    <rect x="-35" y="-10" width="70" height="18" rx="9" fill="#fef9e7" stroke="#e67e22" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" font-size="8" fill="#e67e22">约85km/1.5h</text>
  </g>
  
  <!-- 蜂蜜小镇→乔尔玛 -->
  <g transform="translate(565, 235) rotate(-10)">
    <rect x="-30" y="-10" width="60" height="18" rx="9" fill="#fef9e7" stroke="#e67e22" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" font-size="8" fill="#e67e22">约60km/1h</text>
  </g>

  <!-- 蜂蜜小镇→仙女湖 -->
  <g transform="translate(550, 210) rotate(-25)">
    <rect x="-30" y="-10" width="60" height="18" rx="9" fill="#fef9e7" stroke="#e67e22" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" font-size="8" fill="#e67e22">约40km/1h</text>
  </g>

  <!-- D7 仙女湖→伊宁 -->
  <g transform="translate(450, 380) rotate(-25)">
    <rect x="-38" y="-10" width="76" height="18" rx="9" fill="#e8e0d0" stroke="#95a5a6" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" font-size="8" fill="#7f8c8d">约250km/4h</text>
  </g>
  
  <!-- 伊宁→乌鲁木齐 -->
  <g transform="translate(560, 615) rotate(-10)">
    <rect x="-42" y="-12" width="84" height="20" rx="10" fill="#e8e0d0" stroke="#95a5a6" stroke-width="1.2"/>
    <text x="0" y="3" text-anchor="middle" font-size="9" fill="#7f8c8d">🚗 约690km/8h</text>
  </g>


  <!-- ==================== 每日行程卡片（右侧） ==================== -->
  
  <!-- D1 卡片 -->
  <g transform="translate(710, 40)">
    <rect x="0" y="0" width="140" height="40" rx="10" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5" filter="url(#light-glow)"/>
    <text x="12" y="17" font-size="10" fill="#e74c3c" font-weight="bold">Day 1 · 5/1</text>
    <text x="12" y="32" font-size="9" fill="#7f8c8d">乌鲁木齐→安集海→精河</text>
  </g>

  <!-- D2 卡片 -->
  <g transform="translate(710, 90)">
    <rect x="0" y="0" width="140" height="40" rx="10" fill="#ebf5fb" stroke="#3498db" stroke-width="1.5" filter="url(#light-glow)"/>
    <text x="12" y="17" font-size="10" fill="#2980b9" font-weight="bold">Day 2 · 5/2</text>
    <text x="12" y="32" font-size="9" fill="#7f8c8d">精河→赛湖→果子沟→伊宁</text>
  </g>

  <!-- D3 卡片 -->
  <g transform="translate(710, 140)">
    <rect x="0" y="0" width="140" height="40" rx="10" fill="#e8f8f5" stroke="#2ecc71" stroke-width="1.5" filter="url(#light-glow)"/>
    <text x="12" y="17" font-size="10" fill="#27ae60" font-weight="bold">Day 3 · 5/3</text>
    <text x="12" y="32" font-size="9" fill="#7f8c8d">伊宁→喀拉峻→特克斯</text>
  </g>

  <!-- D4 卡片 -->
  <g transform="translate(710, 190)">
    <rect x="0" y="0" width="140" height="40" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" filter="url(#light-glow)"/>
    <text x="12" y="17" font-size="10" fill="#e67e22" font-weight="bold">Day 4 · 5/4</text>
    <text x="12" y="32" font-size="9" fill="#7f8c8d">特克斯→库尔德宁→巩留</text>
  </g>

  <!-- D5 卡片 -->
  <g transform="translate(710, 240)">
    <rect x="0" y="0" width="140" height="40" rx="10" fill="#f4ecf7" stroke="#9b59b6" stroke-width="1.5" filter="url(#light-glow)"/>
    <text x="12" y="17" font-size="10" fill="#8e44ad" font-weight="bold">Day 5 · 5/5</text>
    <text x="12" y="32" font-size="9" fill="#7f8c8d">巩留→那拉提→新源</text>
  </g>

  <!-- D6 卡片 -->
  <g transform="translate(710, 290)">
    <rect x="0" y="0" width="140" height="40" rx="10" fill="#fef9e7" stroke="#e67e22" stroke-width="1.5" filter="url(#light-glow)"/>
    <text x="12" y="17" font-size="10" fill="#e67e22" font-weight="bold">Day 6 · 5/6</text>
    <text x="12" y="32" font-size="9" fill="#7f8c8d">新源→蜂蜜小镇→乔尔玛→仙女湖</text>
  </g>

  <!-- D7 卡片 -->
  <g transform="translate(710, 340)">
    <rect x="0" y="0" width="140" height="40" rx="10" fill="#e8e0d0" stroke="#95a5a6" stroke-width="1.5" filter="url(#light-glow)"/>
    <text x="12" y="17" font-size="10" fill="#7f8c8d" font-weight="bold">Day 7 · 5/7</text>
    <text x="12" y="32" font-size="9" fill="#7f8c8d">仙女湖→伊宁→乌鲁木齐</text>
  </g>


  <!-- ==================== 图例 / 说明 ==================== -->
  
  <g transform="translate(30, 660)">
    <rect x="0" y="0" width="210" height="75" rx="12" fill="white" stroke="#d5cfc0" stroke-width="1" opacity="0.92"/>
    <text x="15" y="22" font-size="11" fill="#2c3e50" font-weight="bold">📌 图例</text>
    
    <line x1="15" y1="40" x2="48" y2="40" stroke="#e67e22" stroke-width="3" stroke-linecap="round"/>
    <text x="55" y="44" font-size="9" fill="#5d6d7e">主路线（去程）</text>
    
    <line x1="15" y1="60" x2="48" y2="60" stroke="#95a5a6" stroke-width="2" stroke-dasharray="6,4" stroke-linecap="round"/>
    <text x="55" y="64" font-size="9" fill="#5d6d7e">返程 / 虚线路段</text>
