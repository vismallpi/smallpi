  <circle cx="390" cy="460" r="13" fill="#f39c12" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="390" cy="440" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">库尔德宁</text>

  <circle cx="300" cy="440" r="14" fill="#f39c12" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="300" y="465" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">巩留</text>

  <circle cx="520" cy="420" r="18" fill="#8e44ad" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
