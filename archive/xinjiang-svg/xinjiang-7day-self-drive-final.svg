  <text x="340" y="315" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">蜂蜜小镇</text>

  <circle cx="480" cy="345" r="15" fill="#e67e22" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
