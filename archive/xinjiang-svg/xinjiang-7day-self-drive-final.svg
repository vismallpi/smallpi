  <text x="170" y="420" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">伊宁</text>
  <text x="170" y="445" text-anchor="middle" font-size="11" fill="#2c3e50">中转站</text>

  <circle cx="330" cy="500" r="15" fill="#27ae60" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="285" y="490" text-anchor="end" font-size="14" fill="#2c3e50" font-weight="bold">喀拉峻</text>
  <text x="285" y="505" text-anchor="end" font-size="11" fill="#27ae60">草原之王</text>

  <circle cx="245" cy="515" r="15" fill="#27ae60" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="245" y="495" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">特克斯</text>
