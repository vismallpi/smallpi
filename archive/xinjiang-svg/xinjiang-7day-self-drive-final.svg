  <text x="520" y="445" text-anchor="middle" font-size="11" fill="#8e44ad">空中草原</text>

  <circle cx="440" cy="420" r="14" fill="#8e44ad" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
