  <!-- 车程标注：无边框透明背景 -->
  <text x="800" y="460" transform="rotate(-15 800 460)" font-size="11" fill="#e74c3c">🚗 约230km/3h</text>
  <text x="505" y="365" transform="rotate(-10 505 365)" font-size="10" fill="#e74c3c">约140km/2h</text>
  <text x="250" y="210" transform="rotate(-20 250 210)" font-size="10" fill="#2980b9">约140km/2h</text>
  <text x="175" y="120" transform="rotate(15 175 120)" font-size="10" fill="#2980b9">50km/1h</text>
  <text x="185" y="260" transform="rotate(-10 185 260)" font-size="10" fill="#2980b9">约120km/2h</text>
  <text x="250" y="440" transform="rotate(12 250 440)" font-size="10" fill="#27ae60">110km/2h</text>
  <text x="287" y="508" transform="rotate(-8 287 508)" font-size="10" fill="#27ae60">41km/1h</text>
  <text x="317" y="487" font-size="10" fill="#e67e22">约100km/2h</text>
  <text x="315" y="460" transform="rotate(-10 315 460)" font-size="10" fill="#e67e22">50km/1h</text>
  <text x="410" y="430" transform="rotate(-20 410 430)" font-size="11" fill="#8e44ad">🚗 约155km/2.5h</text>
  <text x="480" y="420" transform="rotate(10 480 420)" font-size="10" fill="#8e44ad">约80km/1.5h</text>
  <text x="390" y="380" transform="rotate(-12 390 380)" font-size="10" fill="#e67e22">约85km/1.5h</text>
  <text x="410" y="280" transform="rotate(-10 410 280)" font-size="10" fill="#e67e22">约60km/1h</text>
  <text x="412" y="192" transform="rotate(-25 412 192)" font-size="10" fill="#e67e22">约40km/1h</text>
  <text x="327" y="210" transform="rotate(-25 327 210)" font-size="10" fill="#7f8c8d">约250km/4h</text>
  <text x="555" y="450" transform="rotate(-10 555 450)" font-size="11" fill="#7f8c8d">🚗 约690km/8h</text>


  <!-- 每日行程卡片（右侧） -->
  <g transform="translate(800, 20)">
    <rect x="0" y="0" width="260" height="50" rx="12" fill="#fdedec" stroke="#e74c3c" stroke-width="2" filter="url(#soft-shadow)"/>
    <text x="15" y="21" font-size="12" fill="#e74c3c" font-weight="bold">Day 1 · 5/1</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">乌鲁木齐→安集海→精河</text>
  </g>
  <g transform="translate(800, 80)">
    <rect x="0" y="0" width="260" height="50" rx="12" fill="#ebf5fb" stroke="#3498db" stroke-width="2" filter="url(#soft-shadow)"/>
    <text x="15" y="21" font-size="12" fill="#2980b9" font-weight="bold">Day 2 · 5/2</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">精河→赛湖→果子沟→伊宁</text>
  </g>
  <g transform="translate(800, 140)">
    <rect x="0" y="0" width="260" height="50" rx="12" fill="#e8f8f5" stroke="#2ecc71" stroke-width="2" filter="url(#soft-shadow)"/>
    <text x="15" y="21" font-size="12" fill="#27ae60" font-weight="bold">Day 3 · 5/3</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">伊宁→喀拉峻→特克斯</text>
  </g>
  <g transform="translate(800, 200)">
    <rect x="0" y="0" width="260" height="50" rx="12" fill="#fef9e7" stroke="#f39c12" stroke-width="2" filter="url(#soft-shadow)"/>
    <text x="15" y="21" font-size="12" fill="#e67e22" font-weight="bold">Day 4 · 5/4</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">特克斯→库尔德宁→巩留</text>
  </g>
  <g transform="translate(800, 260)">
    <rect x="0" y="0" width="260" height="50" rx="12" fill="#f4ecf7" stroke="#9b59b6" stroke-width="2" filter="url(#soft-shadow)"/>
    <text x="15" y="21" font-size="12" fill="#8e44ad" font-weight="bold">Day 5 · 5/5</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">巩留→那拉提→新源</text>
  </g>
  <g transform="translate(800, 320)">
    <rect x="0" y="0" width="260" height="50" rx="12" fill="#fef9e7" stroke="#e67e22" stroke-width="2" filter="url(#soft-shadow)"/>
    <text x="15" y="21" font-size="12" fill="#e67e22" font-weight="bold">Day 6 · 5/6</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">新源→蜂蜜小镇→乔尔玛→仙女湖</text>
  </g>
  <g transform="translate(800, 380)">
    <rect x="0" y="0" width="260" height="50" rx="12" fill="#e8e0d0" stroke="#95a5a6" stroke-width="2" filter="url(#soft-shadow)"/>
    <text x="15" y="21" font-size="12" fill="#7f8c8d" font-weight="bold">Day 7 · 5/7</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">仙女湖→伊宁→乌鲁木齐</text>
  </g>

</svg>
