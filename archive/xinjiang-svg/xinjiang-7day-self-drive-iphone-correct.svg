  <circle cx="420" cy="440" r="19" fill="#2c3e50" stroke="#fff" stroke-width="4" filter="url(#soft-shadow)"/>
  <text x="420" y="445" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">伊宁</text>
  <text x="420" y="470" text-anchor="middle" font-size="11" fill="#2c3e50">中转站</text>

  <circle cx="330" cy="360" r="15" fill="#27ae60" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
