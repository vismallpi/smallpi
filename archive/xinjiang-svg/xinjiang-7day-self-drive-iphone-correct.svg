  <text x="660" y="280" text-anchor="middle" font-size="11" fill="#8e44ad">空中草原</text>

  <circle cx="600" cy="290" r="14" fill="#8e44ad" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="600" y="310" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">新源</text>

  <circle cx="620" cy="180" r="13" fill="#e67e22" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="620" y="165" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">蜂蜜小镇</text>

  <circle cx="580" cy="140" r="15" fill="#e67e22" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="580" y="125" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">乔尔玛</text>
  <text x="580" y="155" text-anchor="middle" font-size="10" fill="#e67e22">烈士陵园</text>

  <circle cx="540" cy="100" r="14" fill="#e67e22" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="540" y="85" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">仙女湖</text>


