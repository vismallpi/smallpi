    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#7f8c8d">🚗 约690km/8h</text>
  </g>


  <!-- ==================== 每日行程卡片（右侧） ==================== -->
  <g transform="translate(870, 30)">
    <rect x="0" y="0" width="185" height="50" rx="12" fill="#fdedec" stroke="#e74c3c" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#e74c3c" font-weight="bold">Day 1 · 5/1</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">乌鲁木齐→安集海→精河</text>
  </g>
  <g transform="translate(870, 90)">
    <rect x="0" y="0" width="185" height="50" rx="12" fill="#ebf5fb" stroke="#3498db" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#2980b9" font-weight="bold">Day 2 · 5/2</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">精河→赛湖→果子沟→伊宁</text>
  </g>
  <g transform="translate(870, 150)">
    <rect x="0" y="0" width="185" height="50" rx="12" fill="#e8f8f5" stroke="#2ecc71" stroke-width="2" filter="url(#light-glow)"/>
