  <text x="290" y="365" text-anchor="end" font-size="11" fill="#27ae60">草原之王</text>

  <circle cx="390" cy="395" r="15" fill="#27ae60" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="390" y="380" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">特克斯</text>
  <text x="390" y="415" text-anchor="middle" font-size="10" fill="#27ae60">八卦城</text>

  <circle cx="485" cy="370" r="13" fill="#f39c12" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="485" y="355" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">库尔德宁</text>

  <circle cx="550" cy="390" r="14" fill="#f39c12" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
