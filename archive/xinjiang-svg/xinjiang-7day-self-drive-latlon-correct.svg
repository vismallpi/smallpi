<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 630" font-family="'Comic Neue', 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif">
  <defs>
    <marker id="arrow-solid" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e67e22"/>
    </marker>
    <marker id="arrow-dash" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f39c12"/>
    </marker>
    <marker id="arrow-return" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#95a5a6"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3498db"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfbf7"/>
      <stop offset="100%" stop-color="#f5f0e8"/>
    </linearGradient>
    <filter id="soft-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#d4c5a9" flood-opacity="0.4"/>
    </filter>
    <filter id="light-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feMerge>
        <feMergeNode in="offsetblur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1080" height="630" fill="url(#bg)"/>
  <path d="M0,560 Q150,520 275,540 Q400,490 550,520 Q700,480 850,510 Q970,490 1080,515 L1080,630 L0,630 Z" fill="#e8e0d0" opacity="0.4"/>
  <path d="M0,570 Q225,540 400,560 Q575,530 750,555 Q900,535 1080,560 L1080,630 L0,630 Z" fill="#ddd2be" opacity="0.3"/>

  <!-- 严格按照经纬度比例调整坐标 -->
  <!-- D1: 乌鲁木齐 → 安集海大峡谷 → 精河县 -->
  <path d="M840,460 Q750,435 660,410" 
        stroke="#e74c3c" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M660,410 Q555,385 450,360" 
        stroke="#e74c3c" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D2: 精河县 → 赛里木湖 → 果子沟大桥 → 伊宁 -->
  <path d="M450,360 Q375,270 300,180" 
        stroke="#3498db" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <path d="M300,180 Q310,190 320,200" 
        stroke="#3498db" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <path d="M320,200 Q315,265 310,330" 
        stroke="#3498db" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-blue)"/>

  <!-- D3: 伊宁 → 喀拉峻 → 特克斯 -->
  <path d="M310,330 Q350,365 390,400" 
        stroke="#2ecc71" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M390,400 Q367,405 345,410" 
        stroke="#2ecc71" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D4: 特克斯 → 库尔德宁 → 巩留 -->
  <path d="M345,410 Q392,395 440,380" 
        stroke="#f39c12" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M440,380 Q420,375 400,370" 
        stroke="#f39c12" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D5: 巩留 → 那拉提 → 新源 -->
  <path d="M400,370 Q460,355 520,360" 
        stroke="#9b59b6" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M520,360 Q500,355 480,360" 
        stroke="#9b59b6" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D6: 新源 → 蜂蜜小镇 → 乔尔玛 → 仙女湖 -->
  <path d="M480,360 Q445,338 410,315" 
        stroke="#e67e22" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <path d="M410,315 Q450,318 490,320" 
        stroke="#e67e22" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>
  <!-- 乔尔玛 → 蜂蜜小镇 返程虚线 -->
  <path d="M490,320 Q450,318 410,315" 
        stroke="#95a5a6" stroke-width="3" stroke-dasharray="8,6" fill="none" stroke-linecap="round"/>
  <!-- 蜂蜜小镇 → 仙女湖 -->
  <path d="M410,315 Q452,217 495,120" 
        stroke="#e67e22" stroke-width="4.5" fill="none" stroke-linecap="round" marker-end="url(#arrow-solid)"/>

  <!-- D7: 仙女湖 → 伊宁 → 乌鲁木齐 -->
  <path d="M495,120 Q402,225 310,330" 
        stroke="#95a5a6" stroke-width="3" stroke-dasharray="8,6" fill="none" stroke-linecap="round" marker-end="url(#arrow-return)"/>
  <path d="M310,330 Q575,395 840,460" 
        stroke="#95a5a6" stroke-width="3" stroke-dasharray="8,6" fill="none" stroke-linecap="round" marker-end="url(#arrow-return)"/>


  <!-- ==================== 节点圆点（严格按经纬度比例） ==================== -->
  <circle cx="840" cy="460" r="20" fill="#c0392b" stroke="#fff" stroke-width="4" filter="url(#soft-shadow)"/>
  <text x="840" y="465" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">乌鲁木齐</text>
  <text x="840" y="490" text-anchor="middle" font-size="12" fill="#c0392b">🚩 起点</text>

  <circle cx="660" cy="410" r="15" fill="#e74c3c" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="660" y="395" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">安集海峡谷</text>

  <circle cx="450" cy="360" r="14" fill="#e74c3c" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="450" y="380" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">精河县</text>

  <circle cx="300" cy="180" r="18" fill="#3498db" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="300" y="155" text-anchor="middle" font-size="14" fill="#2c3e50" font-weight="bold">赛里木湖</text>
  <text x="300" y="200" text-anchor="middle" font-size="11" fill="#2980b9">✨ 大西洋最后一滴眼泪</text>

  <circle cx="320" cy="200" r="13" fill="#3498db" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="320" y="220" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">果子沟大桥</text>

  <circle cx="310" cy="330" r="19" fill="#2c3e50" stroke="#fff" stroke-width="4" filter="url(#soft-shadow)"/>
  <text x="310" y="335" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">伊宁</text>
  <text x="310" y="360" text-anchor="middle" font-size="11" fill="#2c3e50">中转站</text>

  <circle cx="390" cy="400" r="15" fill="#27ae60" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="360" y="390" text-anchor="end" font-size="14" fill="#2c3e50" font-weight="bold">喀拉峻</text>
  <text x="360" y="405" text-anchor="end" font-size="11" fill="#27ae60">草原之王</text>

  <circle cx="345" cy="410" r="15" fill="#27ae60" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="345" y="395" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">特克斯</text>
  <text x="345" y="430" text-anchor="middle" font-size="10" fill="#27ae60">八卦城</text>

  <circle cx="440" cy="380" r="13" fill="#f39c12" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="440" y="365" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">库尔德宁</text>

  <circle cx="400" cy="370" r="14" fill="#f39c12" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="400" y="390" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">巩留</text>

  <circle cx="520" cy="360" r="18" fill="#8e44ad" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="520" y="340" text-anchor="middle" font-size="14" fill="#2c3e50" font-weight="bold">那拉提</text>
  <text x="520" y="380" text-anchor="middle" font-size="11" fill="#8e44ad">空中草原</text>

  <circle cx="480" cy="360" r="14" fill="#8e44ad" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="480" y="380" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">新源</text>

  <circle cx="410" cy="315" r="13" fill="#e67e22" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="410" y="300" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">蜂蜜小镇</text>

  <circle cx="490" cy="320" r="15" fill="#e67e22" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="490" y="305" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">乔尔玛</text>
  <text x="490" y="335" text-anchor="middle" font-size="10" fill="#e67e22">烈士陵园</text>

  <circle cx="495" cy="120" r="14" fill="#e67e22" stroke="#fff" stroke-width="3" filter="url(#soft-shadow)"/>
  <text x="495" y="105" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">仙女湖</text>


