    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#7f8c8d">🚗 约690km/8h</text>
  </g>


  <!-- ==================== 每日行程卡片（右侧） ==================== -->
  <g transform="translate(850, 20)">
    <rect x="0" y="0" width="210" height="50" rx="12" fill="#fdedec" stroke="#e74c3c" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#e74c3c" font-weight="bold">Day 1 · 5/1</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">乌鲁木齐→安集海→精河</text>
  </g>
  <g transform="translate(850, 80)">
    <rect x="0" y="0" width="210" height="50" rx="12" fill="#ebf5fb" stroke="#3498db" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#2980b9" font-weight="bold">Day 2 · 5/2</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">精河→赛湖→果子沟→伊宁</text>
  </g>
  <g transform="translate(850, 140)">
    <rect x="0" y="0" width="210" height="50" rx="12" fill="#e8f8f5" stroke="#2ecc71" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#27ae60" font-weight="bold">Day 3 · 5/3</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">伊宁→喀拉峻→特克斯</text>
  </g>
  <g transform="translate(850, 200)">
    <rect x="0" y="0" width="210" height="50" rx="12" fill="#fef9e7" stroke="#f39c12" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#e67e22" font-weight="bold">Day 4 · 5/4</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">特克斯→库尔德宁→巩留</text>
  </g>
  <g transform="translate(850, 260)">
    <rect x="0" y="0" width="210" height="50" rx="12" fill="#f4ecf7" stroke="#9b59b6" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#8e44ad" font-weight="bold">Day 5 · 5/5</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">巩留→那拉提→新源</text>
  </g>
  <g transform="translate(850, 320)">
    <rect x="0" y="0" width="210" height="50" rx="12" fill="#fef9e7" stroke="#e67e22" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#e67e22" font-weight="bold">Day 6 · 5/6</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">新源→蜂蜜小镇→乔尔玛→仙女湖</text>
  </g>
  <g transform="translate(850, 380)">
    <rect x="0" y="0" width="210" height="50" rx="12" fill="#e8e0d0" stroke="#95a5a6" stroke-width="2" filter="url(#light-glow)"/>
    <text x="15" y="21" font-size="12" fill="#7f8c8d" font-weight="bold">Day 7 · 5/7</text>
    <text x="15" y="38" font-size="11" fill="#7f8c8d">仙女湖→伊宁→乌鲁木齐</text>
  </g>


  <!-- ==================== 图例 / 说明 ==================== -->
  <g transform="translate(30, 470)">
    <rect x="0" y="0" width="260" height="80" rx="12" fill="white" stroke="#d5cfc0" stroke-width="1" opacity="0.92"/>
    <text x="15" y="24" font-size="12" fill="#2c3e50" font-weight="bold">📌 图例</text>
    <line x1="15" y1="42" x2="48" y2="42" stroke="#e67e22" stroke-width="3" stroke-linecap="round"/>
    <text x="55" y="46" font-size="10" fill="#5d6d7e">主路线（去程）</text>
    <line x1="15" y1="62" x2="48" y2="62" stroke="#95a5a6" stroke-width="2" stroke-dasharray="6,4" stroke-linecap="round"/>
    <text x="55" y="66" font-size="10" fill="#5d6d7e">返程 / 虚线路</text>
  </g>

</svg>
