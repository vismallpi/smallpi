    <text x="100" y="525"><tspan fill="#e74c3c">■</tspan> 5.1 伊宁 - 赛里木湖 - 果子沟大桥 - 伊宁</text>
    <text x="100" y="545"><tspan fill="#3498db">■</tspan> 5.2 伊宁 - 喀拉峻 - 特克斯</text>
    <text x="100" y="565"><tspan fill="#2ecc71">■</tspan> 5.3 特克斯 - 库尔德宁 - 巩留</text>
    <text x="380" y="525"><tspan fill="#f39c12">■</tspan> 5.4 巩留 - 那拉提 - 新源</text>
    <text x="380" y="545"><tspan fill="#9b59b6">■</tspan> 5.5 新源 - 蜂蜜小镇 - 乔尔玛 - 仙女湖</text>
