<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont,, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: #ffffff;
            color: #37352f;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 40px;
            color: #37352f;
        }

        .add-task {
            margin-bottom: 40px;
            display: flex;
            gap: 10px;
        }

        .add-task input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e9e9e7;
            border-radius: 4px;
            font-size: 16px;
            background-color: #ffffff;
            transition: border-color 0.2s;
        }

        .add-task input:focus {
            outline: none;
            border-color: #2eaadc;
        }

        .add-task button {
            padding: 12px 24px;
            background-color: #2eaadc;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .add-task button:hover {
            background-color: #289fc7;
        }

        .date-group {
            margin-bottom: 30px;
        }

        .date-header {
            font-size: 14px;
            font-weight: 60;
            color: #9b9a97;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid #f7f6f3;
            transition: background-color 0.2s;
        }

        .task-item:hover {
            background-color: #f7f6f3;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #e9e9e7;
            border-radius: 2px;
            margin-right: 12px;
            margin-top: 3px;
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }

        .task-checkbox.checked {
            background-color: #2eaadc;
            border-color: #2eaadc;
        }

        .task-checkbox.checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 12px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-size: 15px;
            color: #37352f;
            transition: all 0.2s;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #9b9a97;
        }

        .task-time {
            font-size: 12px;
            color: #9b9a97;
            white-space: nowrap;
            align-self: center;
            margin-left: 12px;
            flex-shrink: 0;
        }

        .task-actions {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .task-item:hover .task-actions {
            opacity: 1;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #9b9a97;
            cursor: pointer;
            font-size: 18px;
            padding: 0 8px;
            transition: color 0.2s;
        }

        .delete-btn:hover {
            color: #ff4d4f;
        }

        .empty-state {
            text-align: center;
            color: #9b9a97;
            padding: 60px 0;
            font-size: 16px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 16px;
            }

            h1 {
                font-size: 32px;
            }

            .add-task {
                flex-direction: column;
            }

            .add-task button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="pageTitle" contenteditable="true" style="cursor: text;">Tasks</h1>
        <div style="font-size: 14px; color: #9b9a97; margin-bottom: 30px; margin-top: -30px;">
            v2.23 - 修复代码重复bug · 添加按钮可点击 · 重建数据库修复created_at · 标题可编辑 · 日期放在行右侧不换行 · 缩小任务字体 · 方形checkbox · 完成排最后 · 显示创建时间精确到分钟 · 服务端数据库同步 · 2026-04-23
        </div>
        
        <div class="add-task">
            <input type="text" id="newTaskInput" placeholder="添加新任务...">
            <button id="addTaskBtn">添加</button>
        </div>

        <div id="taskList"></div>
        <div id="emptyState" class="empty-state" style="display: none;">
            暂无任务，添加一个新任务开始吧 ✨
        </div>
    </div>

    <script>
        // API 基础地址
        const API_BASE = '/api';

        // 获取任务数据
        async function getTasks() {
            const response = await fetch(`${API_BASE}/tasks`);
            return await response.json();
        }

        // 添加新任务
        async function addTaskToDB(text) {
            const response = await fetch(`${API_BASE}/tasks`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text })
            });
            return await response.json();
        }

        // 切换任务完成状态
        async function toggleTaskCompleteInDB(id) {
            const response = await fetch(`${API_BASE}/tasks/${id}/toggle`, {
                method: 'POST'
            });
            return await response.json();
        }

        // 删除任务
        async function deleteTaskFromDB(id) {
            const response = await fetch(`${API_BASE}/tasks/${id}`, {
                method: 'DELETE'
            });
            return await response.json();
        }

        // 更新任务文字
        async function updateTaskTextInDB(id, text) {
            await fetch(`${API_BASE}/tasks/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text })
            });
        }

        // 渲染任务列表
        async function renderTasks() {
            const taskListEl = document.getElementById('taskList');
            const emptyStateEl = document.getElementById('emptyState');
            const tasks = await getTasks();

            if (tasks.length === 0) {
                taskListEl.innerHTML = '';
                emptyStateEl.style.display = 'block';
                return;
            }

            // 未完成排在前面，完成排在后面
            const sortedTasks = tasks.sort((a, b) => {
                if (a.completed === b.completed) {
                    // 都完成或都未完成，按创建时间降序
                    return b.id.localeCompare(a.id);
                }
                // 未完成排在前面
                return a.completed ? 1 : -1;
            });

            emptyStateEl.style.display = 'none';
            taskList.innerHTML = '';

            sortedTasks.forEach(task => {
                const taskEl = createTaskElement(task);
                taskListEl.appendChild(taskEl);
            });
        }

        // 创建单个任务元素
        function createTaskElement(task) {
            const taskEl = document.createElement('div');
            taskEl.className = 'task-item';

            const checkboxEl = document.createElement('div');
            checkboxEl.className = 'task-checkbox' + (task.completed ? ' checked' : '');
            checkboxEl.addEventListener('click', (e) => {
                e.stopPropagation();
                e.preventDefault();
                toggleTaskComplete(task.id);
            });
            taskEl.appendChild(checkboxEl);

            const contentEl = document.createElement('div');
            contentEl.className = 'task-content';

            const textEl = document.createElement('div');
            textEl.className = 'task-text' + (task.completed ? ' completed' : '');
            textEl.textContent = task.text;
            textEl.addEventListener('click', () => {
                if (!task.completed) {
                    startEditing(task.id, textEl, task.text);
                }
            });
            contentEl.appendChild(textEl);

            taskEl.appendChild(contentEl);

            if (task.created_at) {
                const timeEl = document.createElement('div');
                timeEl.className = 'task-time';
                timeEl.textContent = formatCreatedAt(task.created_at);
                taskEl.appendChild(timeEl);
            }

            const actionsEl = document.createElement('div');
            actionsEl.className = 'task-actions';
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.textContent = '×';
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteTask(task.id);
            });
            actionsEl.appendChild(deleteBtn);
            taskEl.appendChild(actionsEl);

            return taskEl;
        }

        // 添加新任务
        async function addTask() {
            const inputEl = document.getElementById('newTaskInput');
            const text = inputEl.value.trim();
            
            if (!text) return;

            await addTaskToDB(text);
            await renderTasks();
            inputEl.value = '';
        }

        // 切换任务完成状态
        async function toggleTaskComplete(id) {
            await toggleTaskCompleteInDB(id);
            renderTasks();
        }

        // 删除任务
        async function deleteTask(id) {
            await deleteTaskFromDB(id);
            renderTasks();
        }

        // 格式化创建时间 - 强制使用北京时间 (GMT+8)
        function formatCreatedAt(createdAt) {
            // 任务id就是北京时间的毫秒时间戳，优先使用task.id生成时间，保证准确
            let date;
            if (typeof createdAt === 'string' && !isNaN(Number(createdAt))) {
                date = new Date(Number(createdAt));
            } else if (createdAt.includes('-')) {
                // 如果是ISO字符串，强制添加+08:00让浏览器解析为北京时间
                if (!createdAt.includes('+')) {
                    createdAt = createdAt + '+08:00';
                }
                date = new Date(createdAt);
            } else {
                date = new Date(createdAt);
            }
            
            // 强制转换为北京时间
            const beijingDate = new Date(date.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }));
            const month = beijingDate.getMonth() + 1;
            const day = beijingDate.getDate();
            const hours = String(beijingDate.getHours()).padStart(2, '0');
            const minutes = String(beijingDate.getMinutes()).padStart(2, '0');
            return `${month}/${day} ${hours}:${minutes}`;
        }

        // 开始编辑任务
        function startEditing(id, textEl, oldText) {
            const input = document.createElement('input');
            input.type = 'text';
            input.value = oldText;
            input.style.width = '100%';
            input.style.fontSize = '16px';
            input.style.border = '1px solid #2eaadc';
            input.style.borderRadius = '4px';
            input.style.padding = '4px 8px';
            input.style.outline = 'none';
            textEl.style.display = 'none';
            textEl.parentNode.insertBefore(input, textEl.nextSibling);
            input.focus();

            async function finishEditing() {
                const newText = input.value.trim();
                if (newText && newText !== oldText) {
                    await updateTaskTextInDB(id, newText);
                    renderTasks();
                } else {
                    textEl.style.display = 'block';
                    input.remove();
                }
            }

            input.addEventListener('blur', finishEditing);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    finishEditing();
                }
                if (e.key === 'Escape') {
                    textEl.style.display = 'block';
                    input.remove();
                }
            });
        }

        // 事件监听
        document.getElementById('addTaskBtn').addEventListener('click', addTask);
        document.getElementById('newTaskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // 初始渲染
        renderTasks();
    </script>
</body>
</html>
