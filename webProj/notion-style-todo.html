<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: #ffffff;
            color: #37352f;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 40px;
            color: #37352f;
        }

        .version-info {
            font-size: 14px;
            color: #9b9a97;
            margin-bottom: 30px;
            margin-top: -30px;
        }

        .add-task {
            margin-bottom: 40px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .add-task input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 1px solid #e9e9e7;
            border-radius: 4px;
            font-size: 16px;
            background-color: #ffffff;
            transition: border-color 0.2s;
        }

        .add-task input:focus {
            outline: none;
            border-color: #2eaadc;
        }

        .add-task button {
            padding: 12px 20px;
            background-color: #2eaadc;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .add-task button:hover {
            background-color: #289fc7;
        }

        .date-group {
            margin-bottom: 30px;
        }

        .date-header {
            font-size: 14px;
            font-weight: 600;
            color: #9b9a97;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid #f7f6f3;
            transition: background-color 0.2s;
        }

        .task-item:hover {
            background-color: #f7f6f3;
        }

        .task-item.dragging {
            opacity: 0.5;
            background-color: #e3f2fd;
        }

        .task-item.drag-over {
            border-top: 3px solid #2eaadc;
        }

        .drag-handle {
            cursor: grab;
            padding: 0 5px;
            color: #ccc;
            font-size: 16px;
            align-self: center;
            flex-shrink: 0;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #e9e9e7;
            border-radius: 2px;
            margin-right: 12px;
            margin-top: 3px;
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }

        .task-checkbox.checked {
            background-color: #2eaadc;
            border-color: #2eaadc;
        }

        .task-checkbox.checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 12px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-size: 15px;
            color: #37352f;
            transition: all 0.2s;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #9b9a97;
        }

        .task-time {
            font-size: 12px;
            color: #9b9a97;
            white-space: nowrap;
            align-self: center;
            margin-left: 12px;
            flex-shrink: 0;
        }

        .task-actions {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .task-item:hover .task-actions {
            opacity: 1;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #9b9a97;
            cursor: pointer;
            font-size: 18px;
            padding: 0 8px;
            transition: color 0.2s;
        }

        .delete-btn:hover {
            color: #ff4d4f;
        }

        .empty-state {
            text-align: center;
            color: #9b9a97;
            padding: 60px 0;
            font-size: 16px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 16px;
            }

            h1 {
                font-size: 32px;
            }

            .add-task {
                flex-direction: column;
            }

            .add-task button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="pageTitle" contenteditable="true" style="cursor: text;">Tasks</h1>
        <div class="version-info">
            v3.1.12 - 对接飞书语音识别 · 简化确认框文字 · 添加checkbox二次确认 · 修复标题保存路径bug · 修复API_BASE变量冲突bug · 同时支持HTTP(8081)/HTTPS(8080) · 标题后端存储 · 支持PC+手机拖拽 · 语音输入 · 标题可编辑 · 2026-04-26
        </div>
        
        <div class="add-task">
            <input type="text" id="newTaskInput" placeholder="添加新任务...">
            <button id="addTaskBtn">添加</button>
            <button id="voiceInputBtn" style="background-color: #8e44ad;">🎤</button>
        </div>

        <div id="taskList"></div>
        <div id="emptyState" class="empty-state" style="display: none;">
            暂无任务，添加一个新任务开始吧 ✨
        </div>
    </div>

<script>
// API 基础地址
const API_BASE = '/api';

// 获取任务数据
async function getTasks() {
    const response = await fetch(`${API_BASE}/tasks`);
    return await response.json();
}

// 添加新任务
async function addTaskToDB(text) {
    const response = await fetch(`${API_BASE}/tasks`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ text })
    });
    return await response.json();
}

// 切换任务完成状态
async function toggleTaskCompleteInDB(id) {
    const response = await fetch(`${API_BASE}/tasks/${id}/toggle`, {
        method: 'POST'
    });
    return await response.json();
}

// 删除任务
async function deleteTaskFromDB(id) {
    const response = await fetch(`${API_BASE}/tasks/${id}`, {
        method: 'DELETE'
    });
    return await response.json();
}

// 更新任务文字
async function updateTaskTextInDB(id, text) {
    await fetch(`${API_BASE}/tasks/${id}`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ text })
    });
}

// 渲染任务列表
async function renderTasks() {
    console.log('Rendering tasks...');
    const taskListEl = document.getElementById('taskList');
    const emptyStateEl = document.getElementById('emptyState');
    const tasks = await getTasks();
    console.log('Tasks received:', tasks);

    if (tasks.length === 0) {
        taskListEl.innerHTML = '';
        emptyStateEl.style.display = 'block';
        return;
    }

    // 未完成排在前面，完成排在后面
    const sortedTasks = tasks.sort((a, b) => {
        if (a.completed === b.completed) {
            // 都完成或都未完成，按创建时间降序
            return b.id.localeCompare(a.id);
        }
        // 未完成排在前面
        return a.completed ? 1 : -1;
    });

    emptyStateEl.style.display = 'none';
    taskListEl.innerHTML = '';

    sortedTasks.forEach(task => {
        const taskEl = createTaskElement(task);
        taskListEl.appendChild(taskEl);
    });
    console.log('Render complete');
}

// 创建单个任务元素
function createTaskElement(task) {
    const taskEl = document.createElement('div');
    taskEl.className = 'task-item';
    taskEl.draggable = true;
    taskEl.dataset.taskId = task.id;

    // 拖拽手柄
    const dragHandle = document.createElement('div');
    dragHandle.className = 'drag-handle';
    dragHandle.textContent = '⋮⋮';
    taskEl.appendChild(dragHandle);

    const checkboxEl = document.createElement('div');
    checkboxEl.className = 'task-checkbox' + (task.completed ? ' checked' : '');
    checkboxEl.addEventListener('click', (e) => {
        e.stopPropagation();
        e.preventDefault();
        toggleTaskComplete(task.id);
    });
    taskEl.appendChild(checkboxEl);

    const contentEl = document.createElement('div');
    contentEl.className = 'task-content';

    const textEl = document.createElement('div');
    textEl.className = 'task-text' + (task.completed ? ' completed' : '');
    textEl.textContent = task.text;
    textEl.addEventListener('click', () => {
        if (!task.completed) {
            startEditing(task.id, textEl, task.text);
        }
    });
    contentEl.appendChild(textEl);

    taskEl.appendChild(contentEl);

    if (task.created_at) {
        const timeEl = document.createElement('div');
        timeEl.className = 'task-time';
        timeEl.textContent = formatCreatedAt(task.created_at);
        taskEl.appendChild(timeEl);
    }

    const actionsEl = document.createElement('div');
    actionsEl.className = 'task-actions';
    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'delete-btn';
    deleteBtn.textContent = '×';
    deleteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteTask(task.id);
    });
    actionsEl.appendChild(deleteBtn);
    taskEl.appendChild(actionsEl);

    return taskEl;
}

// 添加新任务
async function addTask() {
    const inputEl = document.getElementById('newTaskInput');
    const text = inputEl.value.trim();
    
    if (!text) return;

    await addTaskToDB(text);
    await renderTasks();
    inputEl.value = '';
}

// 切换任务完成状态
async function toggleTaskComplete(id) {
    // 先获取当前任务状态
    const tasks = await getTasks();
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    
    // 二次确认
    if (!confirm(`确认切换 "${task.text}" 状态？`)) {
        // 用户取消，刷新checkbox保持原状态
        await renderTasks();
        return;
    }
    
    await toggleTaskCompleteInDB(id);
    await renderTasks();
}

// 删除任务
async function deleteTask(id) {
    await deleteTaskFromDB(id);
    await renderTasks();
}

// 格式化创建时间 - 强制使用北京时间 (GMT+8)
function formatCreatedAt(createdAt) {
    // 任务id就是北京时间的毫秒时间戳，优先使用task.id生成时间，保证准确
    let date;
    if (typeof createdAt === 'string' && !isNaN(Number(createdAt))) {
        date = new Date(Number(createdAt));
    } else if (createdAt.includes('-')) {
        // 如果是ISO字符串，强制添加+08:00让浏览器解析为北京时间
        if (!createdAt.includes('+')) {
            createdAt = createdAt + '+08:00';
        }
        date = new Date(createdAt);
    } else {
        date = new Date(createdAt);
    }
    
    // 强制转换为北京时间
    const beijingDate = new Date(date.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }));
    const month = beijingDate.getMonth() + 1;
    const day = beijingDate.getDate();
    const hours = String(beijingDate.getHours()).padStart(2, '0');
    const minutes = String(beijingDate.getMinutes()).padStart(2, '0');
    return `${month}/${day} ${hours}:${minutes}`;
}

// 开始编辑任务
function startEditing(id, textEl, oldText) {
    const input = document.createElement('input');
    input.type = 'text';
    input.value = oldText;
    input.style.width = '100%';
    input.style.fontSize = '16px';
    input.style.border = '1px solid #2eaadc';
    input.style.borderRadius = '4px';
    input.style.padding = '4px 8px';
    input.style.outline = 'none';
    textEl.style.display = 'none';
    textEl.parentNode.insertBefore(input, textEl.nextSibling);
    input.focus();

    async function finishEditing() {
        const newText = input.value.trim();
        if (newText && newText !== oldText) {
            await updateTaskTextInDB(id, newText);
            await renderTasks();
        } else {
            textEl.style.display = 'block';
            input.remove();
        }
    }

    input.addEventListener('blur', finishEditing);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            finishEditing();
        }
        if (e.key === 'Escape') {
            textEl.style.display = 'block';
            input.remove();
        }
    });
}

// ==================== 拖拽排序功能 - 支持PC + 移动端触摸 ====================
let draggedItem = null;
let isDragging = false;

function enableDragSort() {
    const taskList = document.getElementById('taskList');
    
    // ======== PC端拖拽 ========
    taskList.addEventListener('dragstart', (e) => {
        if (e.target.closest('.task-item')) {
            draggedItem = e.target.closest('.task-item');
            draggedItem.classList.add('dragging');
            if (e.dataTransfer) {
                e.dataTransfer.effectAllowed = 'move';
            }
        }
    });

    taskList.addEventListener('dragend', async (e) => {
        if (draggedItem) {
            draggedItem.classList.remove('dragging');
            document.querySelectorAll('.task-item').forEach(item => {
                item.classList.remove('drag-over');
            });
            draggedItem = null;
        }
    });

    taskList.addEventListener('dragover', (e) => {
        e.preventDefault();
        const afterElement = getDragAfterElement(taskList, e.clientY);
        const currentDragging = document.querySelector('.dragging');
        if (afterElement == null) {
            if (currentDragging) {
                taskList.appendChild(currentDragging);
            }
        } else {
            taskList.insertBefore(currentDragging, afterElement);
        }
    });

    taskList.addEventListener('dragenter', (e) => {
        e.preventDefault();
        const targetItem = e.target.closest('.task-item');
        if (targetItem && targetItem !== draggedItem) {
            targetItem.classList.add('drag-over');
        }
    });

    taskList.addEventListener('dragleave', (e) => {
        const targetItem = e.target.closest('.task-item');
        if (targetItem) {
            targetItem.classList.remove('drag-over');
        }
    });

    taskList.addEventListener('drop', async (e) => {
        e.preventDefault();
        document.querySelectorAll('.task-item').forEach(item => {
            item.classList.remove('drag-over');
        });
    });

    // ======== 移动端触摸拖拽 ========
    let draggedItemMobile = null;
    let startY = 0;

    taskList.addEventListener('touchstart', (e) => {
        const handle = e.target.closest('.drag-handle');
        if (!handle) return;
        
        draggedItemMobile = handle.closest('.task-item');
        if (!draggedItemMobile) return;

        isDragging = true;
        draggedItemMobile.classList.add('dragging');
        draggedItem = draggedItemMobile;
        startY = e.touches[0].clientY;
        document.body.style.overflow = 'hidden';
        e.preventDefault();
    }, { passive: false });

    taskList.addEventListener('touchmove', (e) => {
        if (!isDragging || !draggedItemMobile) return;
        
        const currentY = e.touches[0].clientY;
        const diffY = currentY - startY;
        
        // 移动视觉位置
        draggedItemMobile.style.transform = `translateY(${diffY}px)`;
        
        // 找到插入位置
        const afterElement = getDragAfterElement(taskList, currentY);
        const allItems = [...taskList.querySelectorAll('.task-item:not(.dragging)')];
        
        if (afterElement) {
            taskList.insertBefore(draggedItemMobile, afterElement);
        } else {
            // 找不到就是放最后
            const lastItem = allItems[allItems.length - 1];
            if (lastItem && lastItem !== draggedItemMobile) {
                taskList.appendChild(draggedItemMobile);
            }
        }

        // 更新高亮
        document.querySelectorAll('.task-item').forEach(item => {
            item.classList.remove('drag-over');
        });
        if (afterElement) {
            afterElement.classList.add('drag-over');
        }

        e.preventDefault();
    }, { passive: false });

    taskList.addEventListener('touchend', async (e) => {
        if (!isDragging || !draggedItemMobile) return;
        
        draggedItemMobile.style.transform = '';
        draggedItemMobile.classList.remove('dragging');
        document.querySelectorAll('.task-item').forEach(item => {
            item.classList.remove('drag-over');
        });
        document.body.style.overflow = '';
        isDragging = false;
        draggedItemMobile = null;
        draggedItem = null;
    });
}

function getDragAfterElement(container, y) {
    const draggableElements = [...container.querySelectorAll('.task-item:not(.dragging)')];
    
    if (draggableElements.length === 0) return null;
    
    return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) {
            return { offset: offset, element: child };
        } else {
            return closest;
        }
    }, { offset: Number.NEGATIVE_INFINITY }).element;
}

// 事件监听
document.getElementById('addTaskBtn').addEventListener('click', addTask);
document.getElementById('newTaskInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        addTask();
    }
});

// 启用拖拽排序
enableDragSort();

// 初始渲染
console.log('Starting initial render...');
renderTasks();

// ==================== 语音输入功能 - 飞书语音识别 ====================
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let stream = null;

function toggleVoiceButton(recording) {
    const btn = document.getElementById('voiceInputBtn');
    if (recording) {
        btn.style.backgroundColor = '#e74c3c';
        btn.textContent = '🔴';
    } else {
        btn.style.backgroundColor = '#8e44ad';
        btn.textContent = '🎤';
    }
}

// 开始录音
async function startRecording() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
                audioChunks.push(event.data);
            }
        };

        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            await recognizeSpeech(audioBlob);
            // 停止所有音轨
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        };

        mediaRecorder.start();
        isRecording = true;
        toggleVoiceButton(true);
    } catch (error) {
        console.error('获取麦克风失败:', error);
        let errorMsg = '获取麦克风权限失败: ' + error.message;
        if (error.name === 'NotAllowedError') {
            errorMsg = '麦克风权限被拒绝，请在浏览器地址栏允许麦克风访问';
        }
        alert(errorMsg);
        toggleVoiceButton(false);
        isRecording = false;
    }
}

// 停止录音并识别
function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        toggleVoiceButton(false);
        isRecording = false;
    }
}

// 调用后端飞书语音识别API
async function recognizeSpeech(audioBlob) {
    const inputEl = document.getElementById('newTaskInput');
    inputEl.value = '正在识别...';

    try {
        const formData = new FormData();
        formData.append('audio', audioBlob, 'recording.wav');

        const response = await fetch('/api/recognize', {
            method: 'POST',
            body: formData
        });

        const result = await response.json();

        if (result.success && result.text) {
            inputEl.value = result.text;
        } else {
            inputEl.value = '';
            alert('识别失败: ' + (result.error || '未知错误'));
        }
    } catch (error) {
        console.error('识别请求失败:', error);
        inputEl.value = '';
        alert('识别请求失败: ' + error.message);
    }
}

function startVoiceInput() {
    // 检查是否是HTTPS或localhost
    if (window.location.protocol !== 'https:' && 
        window.location.hostname !== 'localhost' && 
        window.location.hostname !== '127.0.0.1') {
        alert('语音识别需要HTTPS协议！\n\n请使用 HTTPS 访问：\nhttps://' + window.location.hostname + ':' + window.location.port);
        return;
    }

    if (isRecording) {
        stopRecording();
        return;
    }

    startRecording();
}

// 绑定语音按钮事件
document.getElementById('voiceInputBtn').addEventListener('click', startVoiceInput);

// ==================== 页面标题保存功能 ====================
const pageTitleEl = document.getElementById('pageTitle');

// 页面加载时读取保存的标题
async function loadPageTitle() {
    try {
        const response = await fetch(`${API_BASE}/page-title`);
        const data = await response.json();
        if (data.success && data.title) {
            pageTitleEl.textContent = data.title;
        }
    } catch (error) {
        console.error('加载标题失败', error);
        // 失败了用默认标题
    }
}

// 标题修改时自动保存到后端
pageTitleEl.addEventListener('input', async () => {
    const currentTitle = pageTitleEl.textContent.trim();
    try {
        await fetch(`${API_BASE}/page-title`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ title: currentTitle })
        });
    } catch (error) {
        console.error('保存标题失败', error);
    }
});

// 加载标题
loadPageTitle();
</script>
</body>
</html>
